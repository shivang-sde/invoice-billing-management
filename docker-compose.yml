version: '3.9'

services:
  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: invoice_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-invoice_db}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-apppassword}
      MYSQL_INITDB_SKIP_TZINFO: 'yes'
    ports:
      - "3307:3306" # Public host port 3307 maps to container port 3306
    networks:
      - app-network
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-appuser}", "-p${MYSQL_PASSWORD:-apppassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_allowed_packet=256M
      - --log_bin_trust_function_creators=1

  # Node.js Backend Service
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: invoice_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-5000}
      DB_HOST: db
      DB_PORT: 3306  # ◄ FIXED: Internal container networks talk over 3306
      DB_NAME: ${MYSQL_DATABASE:-invoice_db}
      DB_USER: ${MYSQL_USER:-appuser}
      DB_PASSWORD: ${MYSQL_PASSWORD:-apppassword}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    # ◄ REMOVED: Public port block removed to prevent port 5000 conflicts on host
    networks:
      - app-network
    volumes:
      - uploads_data:/app/upload
      - uploads_data:/app/uploads
      - ./server/src:/app/src:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-5000}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # React Frontend Service (Nginx)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: invoice_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8090:80"
    networks:
      - app-network
    volumes:
      - ./client/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./client/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  app-network:
    driver: bridge
    name: invoice_network

volumes:
  mysql_data:
    driver: local
    name: invoice_mysql_data
  uploads_data:
    driver: local
    name: invoice_uploads_data